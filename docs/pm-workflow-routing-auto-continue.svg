<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">pm-workflow 路由与自动续跑实现图</title>
  <desc id="desc">展示 pm-workflow 的实现视角闭环：用户任务进入 pm 主协调，经 analyzer 判断是否需要 commander 顾问建议，再由 dispatch-tools 调度专业 agent 执行，由 evaluator 产出下一步与 auto-continue 信号，经 runtime 和 gate 共同决定是否继续或停止。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#42526e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#091e42" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f7f9fc; }
      .lane { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.5; rx: 18; }
      .lane-title { font: 700 20px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172b4d; }
      .box { fill: #ffffff; stroke: #7a869a; stroke-width: 1.6; rx: 14; filter: url(#shadow); }
      .box-blue { fill: #e9f2ff; stroke: #3578d4; }
      .box-green { fill: #e8f7ef; stroke: #2f855a; }
      .box-yellow { fill: #fff6df; stroke: #b7791f; }
      .box-purple { fill: #f2edff; stroke: #7650c4; }
      .box-red { fill: #fff0f0; stroke: #c53030; }
      .decision { fill: #fffdf5; stroke: #b7791f; stroke-width: 1.8; filter: url(#shadow); }
      .label { font: 600 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172b4d; }
      .small { font: 400 13px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #42526e; }
      .tiny { font: 400 12px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5e6c84; }
      .edge { fill: none; stroke: #42526e; stroke-width: 2.1; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #7a869a; stroke-width: 1.7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1120"/>

  <rect class="lane" x="40" y="40" width="1520" height="260"/>
  <text class="lane-title" x="70" y="76">1. 角色与组件分工</text>

  <rect class="box box-blue" x="85" y="120" width="180" height="62"/>
  <text class="label" x="118" y="146">User / OpenCode</text>
  <text class="small" x="118" y="168">任务进入系统</text>

  <rect class="box box-blue" x="315" y="120" width="180" height="62"/>
  <text class="label" x="366" y="146">pm 主协调</text>
  <text class="small" x="346" y="168">统一入口</text>

  <rect class="box" x="545" y="120" width="180" height="62"/>
  <text class="label" x="600" y="146">analyzer</text>
  <text class="small" x="584" y="168">识别任务特征</text>

  <rect class="box box-purple" x="775" y="120" width="210" height="62"/>
  <text class="label" x="810" y="146">commander</text>
  <text class="small" x="810" y="168">advisor-only 顾问建议</text>

  <rect class="box box-green" x="1040" y="120" width="300" height="62"/>
  <text class="label" x="1070" y="146">backend / frontend / writer / qa_engineer</text>
  <text class="small" x="1070" y="168">专业 agent 执行任务</text>

  <rect class="box" x="1385" y="120" width="130" height="62"/>
  <text class="label" x="1414" y="146">evaluator</text>
  <text class="small" x="1414" y="168">输出评估</text>

  <rect class="box box-yellow" x="360" y="215" width="220" height="58"/>
  <text class="label" x="392" y="240">dispatch-tools</text>
  <text class="small" x="392" y="261">拼装、执行与汇总链路</text>

  <rect class="box box-yellow" x="670" y="215" width="180" height="58"/>
  <text class="label" x="730" y="240">runtime</text>
  <text class="small" x="705" y="261">构造下一跳 dispatch</text>

  <rect class="box box-red" x="940" y="215" width="250" height="58"/>
  <text class="label" x="982" y="240">gate / permission / confirm</text>
  <text class="small" x="982" y="261">拦截不安全推进</text>

  <path class="edge" d="M265 151 H315"/>
  <path class="edge" d="M495 151 H545"/>
  <path class="edge-soft" d="M725 151 H775"/>
  <path class="edge-soft" d="M880 182 V210 C880 220 990 220 1040 151"/>
  <path class="edge" d="M985 151 H1040"/>
  <path class="edge" d="M1340 151 H1385"/>
  <path class="edge-soft" d="M405 182 V215"/>
  <path class="edge-soft" d="M760 182 V215"/>
  <path class="edge-soft" d="M1065 182 V215"/>

  <rect class="lane" x="40" y="330" width="1520" height="740"/>
  <text class="lane-title" x="70" y="366">2. 执行与自动续跑闭环</text>

  <rect class="box" x="90" y="430" width="180" height="56"/>
  <text class="label" x="130" y="455">analyze task</text>
  <text class="small" x="120" y="476">识别任务与阶段上下文</text>

  <rect class="box" x="320" y="430" width="200" height="56"/>
  <text class="label" x="346" y="455">build handoff packet</text>
  <text class="small" x="352" y="476">组装交接信息</text>

  <rect class="box box-green" x="570" y="430" width="180" height="56"/>
  <text class="label" x="606" y="455">execute dispatch</text>
  <text class="small" x="604" y="476">执行当前分派</text>

  <rect class="box" x="800" y="430" width="180" height="56"/>
  <text class="label" x="840" y="455">evaluate result</text>
  <text class="small" x="820" y="476">读取结果并判断下一步</text>

  <path class="edge" d="M270 458 H320"/>
  <path class="edge" d="M520 458 H570"/>
  <path class="edge" d="M750 458 H800"/>

  <rect class="box box-blue" x="1070" y="395" width="190" height="56"/>
  <text class="label" x="1094" y="420">recommendedNextAgent</text>
  <text class="small" x="1112" y="441">推荐下一位 agent</text>

  <rect class="box box-blue" x="1310" y="395" width="190" height="56"/>
  <text class="label" x="1332" y="420">recommendedNextAction</text>
  <text class="small" x="1350" y="441">推荐下一步动作</text>

  <rect class="box box-blue" x="1070" y="475" width="190" height="56"/>
  <text class="label" x="1097" y="500">canAutoContinue /</text>
  <text class="small" x="1102" y="521">autoContinueSafe</text>

  <rect class="box box-blue" x="1310" y="475" width="190" height="56"/>
  <text class="label" x="1354" y="500">nextAutoAction</text>
  <text class="small" x="1344" y="521">自动续跑动作</text>

  <path class="edge-soft" d="M980 458 C1020 430 1030 425 1070 423"/>
  <path class="edge-soft" d="M980 458 C1030 420 1180 405 1310 423"/>
  <path class="edge-soft" d="M980 458 C1020 500 1030 503 1070 503"/>
  <path class="edge-soft" d="M980 458 C1030 515 1180 520 1310 503"/>

  <polygon class="decision" points="455,650 575,585 695,650 575,715"/>
  <text class="label" x="525" y="645">允许自动续跑？</text>
  <text class="small" x="528" y="666">读取评估信号</text>

  <polygon class="decision" points="840,650 960,585 1080,650 960,715"/>
  <text class="label" x="900" y="645">通过 gate /</text>
  <text class="small" x="882" y="666">permission / confirm？</text>

  <polygon class="decision" points="1235,650 1360,585 1485,650 1360,715"/>
  <text class="label" x="1286" y="645">达到上限或</text>
  <text class="small" x="1297" y="666">遇到 stop reason？</text>

  <rect class="box box-yellow" x="330" y="795" width="210" height="58"/>
  <text class="label" x="352" y="820">build next dispatch</text>
  <text class="small" x="360" y="841">runtime 构造下一跳</text>

  <rect class="box box-green" x="610" y="795" width="220" height="58"/>
  <text class="label" x="642" y="820">execute auto-continue step</text>
  <text class="small" x="670" y="841">dispatch-tools 执行</text>

  <rect class="box" x="900" y="795" width="230" height="58"/>
  <text class="label" x="924" y="820">append auto-continue summary</text>
  <text class="small" x="968" y="841">补充链路摘要</text>

  <rect class="box box-red" x="1200" y="795" width="210" height="58"/>
  <text class="label" x="1236" y="820">stop and return reason</text>
  <text class="small" x="1256" y="841">返回停止原因</text>

  <rect class="box" x="1200" y="920" width="210" height="58"/>
  <text class="label" x="1256" y="945">finish current loop</text>
  <text class="small" x="1242" y="966">完成本轮执行闭环</text>

  <path class="edge" d="M890 486 C890 545 660 560 575 585"/>
  <path class="edge" d="M695 650 H840"/>
  <text class="tiny" x="752" y="636">是</text>
  <path class="edge-soft" d="M575 715 V795"/>
  <text class="tiny" x="585" y="758">否，停止</text>
  <path class="edge" d="M1080 650 H1235"/>
  <text class="tiny" x="1144" y="636">是</text>
  <path class="edge-soft" d="M960 715 C960 770 1250 770 1200 824"/>
  <text class="tiny" x="1034" y="760">否，停止</text>
  <path class="edge-soft" d="M455 650 C380 700 380 745 435 795"/>
  <path class="edge" d="M540 824 H610"/>
  <path class="edge" d="M830 824 H900"/>
  <path class="edge" d="M1130 824 H1200"/>
  <path class="edge-soft" d="M1360 715 V795"/>
  <text class="tiny" x="1372" y="760">是，收尾</text>
  <path class="edge-soft" d="M1360 650 C1360 760 710 740 720 795"/>
  <text class="tiny" x="1128" y="738">否，继续自动续跑</text>
  <path class="edge-soft" d="M720 853 C720 900 860 900 890 486"/>
  <text class="tiny" x="748" y="886">进入下一次 evaluate</text>
  <path class="edge-soft" d="M1305 853 V920"/>

  <rect class="box box-red" x="90" y="955" width="300" height="64"/>
  <text class="label" x="118" y="982">关键约束：自动续跑不会绕过安全边界</text>
  <text class="small" x="118" y="1004">只有 evaluator 给出低风险信号，且 gate / permission / confirm 通过时，才允许进入下一跳。</text>
</svg>
