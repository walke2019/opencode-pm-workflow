<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040" role="img" aria-labelledby="title desc">
  <title id="title">opencode-pm-workflow 中文调度流转图</title>
  <desc id="desc">展示 OpenCode 如何触发 pm-workflow 插件，插件如何判断阶段、调度 agent、执行门禁，并形成从需求到开发、审查、文档、交付的闭环。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#42526e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#091e42" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f7f9fc; }
      .lane { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.5; rx: 18; }
      .lane-title { font: 700 18px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172b4d; }
      .box { fill: #ffffff; stroke: #7a869a; stroke-width: 1.6; rx: 12; filter: url(#shadow); }
      .box-blue { fill: #e9f2ff; stroke: #3578d4; }
      .box-green { fill: #e8f7ef; stroke: #2f855a; }
      .box-yellow { fill: #fff6df; stroke: #b7791f; }
      .box-purple { fill: #f2edff; stroke: #7650c4; }
      .box-red { fill: #fff0f0; stroke: #c53030; }
      .decision { fill: #fffdf5; stroke: #b7791f; stroke-width: 1.8; filter: url(#shadow); }
      .label { font: 600 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172b4d; }
      .small { font: 400 13px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #42526e; }
      .tiny { font: 400 12px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5e6c84; }
      .edge { fill: none; stroke: #42526e; stroke-width: 2; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #7a869a; stroke-width: 1.8; marker-end: url(#arrow); }
      .edge-no-arrow { fill: none; stroke: #7a869a; stroke-width: 1.6; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="1040"/>

  <rect class="lane" x="40" y="40" width="1320" height="150"/>
  <text class="lane-title" x="70" y="76">1. 触发与插件启动</text>
  <rect class="box box-blue" x="80" y="105" width="245" height="54"/>
  <text class="label" x="105" y="128">OpenCode 会话</text>
  <text class="small" x="105" y="148">用户提出任务</text>
  <rect class="box" x="390" y="105" width="255" height="54"/>
  <text class="label" x="415" y="128">加载 pm-workflow</text>
  <text class="small" x="415" y="148">server + tui 插件</text>
  <rect class="box" x="710" y="105" width="280" height="54"/>
  <text class="label" x="735" y="128">合并配置</text>
  <text class="small" x="735" y="148">包默认、全局、插件参数、项目配置</text>
  <rect class="box box-green" x="1060" y="105" width="250" height="54"/>
  <text class="label" x="1085" y="128">注入 OpenCode agents</text>
  <text class="small" x="1085" y="148">通过 config hook</text>
  <path class="edge" d="M325 132 H390"/>
  <path class="edge" d="M645 132 H710"/>
  <path class="edge" d="M990 132 H1060"/>

  <rect class="lane" x="40" y="220" width="1320" height="220"/>
  <text class="lane-title" x="70" y="256">2. 触发路径</text>
  <polygon class="decision" points="190,305 285,255 380,305 285,355"/>
  <text class="label" x="250" y="301">触发</text>
  <text class="small" x="250" y="320">类型</text>

  <rect class="box box-yellow" x="470" y="245" width="275" height="54"/>
  <text class="label" x="495" y="268">会话事件</text>
  <text class="small" x="495" y="288">同步状态与门禁</text>
  <rect class="box box-yellow" x="470" y="318" width="275" height="54"/>
  <text class="label" x="495" y="341">提示词追加</text>
  <text class="small" x="495" y="361">assist/strict 模式注入阶段摘要</text>
  <rect class="box box-yellow" x="810" y="245" width="275" height="54"/>
  <text class="label" x="835" y="268">工具 hooks</text>
  <text class="small" x="835" y="288">代码改动后标记待审查</text>
  <rect class="box box-yellow" x="810" y="318" width="275" height="54"/>
  <text class="label" x="835" y="341">命令或工具调用</text>
  <text class="small" x="835" y="361">调度、预演、执行</text>
  <path class="edge" d="M380 305 C420 275 430 272 470 272"/>
  <path class="edge" d="M380 305 C420 342 430 345 470 345"/>
  <path class="edge" d="M380 305 C560 270 650 272 810 272"/>
  <path class="edge" d="M380 305 C560 342 650 345 810 345"/>

  <rect class="lane" x="40" y="470" width="1320" height="260"/>
  <text class="lane-title" x="70" y="506">3. 调度判断与安全门禁</text>
  <rect class="box" x="80" y="545" width="275" height="62"/>
  <text class="label" x="105" y="568">生成状态摘要</text>
  <text class="small" x="105" y="588">文档、阶段、任务、审查、发布</text>
  <polygon class="decision" points="490,576 595,520 700,576 595,632"/>
  <text class="label" x="550" y="573">调度</text>
  <text class="small" x="548" y="592">决策</text>
  <rect class="box box-purple" x="800" y="485" width="230" height="54"/>
  <text class="label" x="825" y="508">pm-run-dispatch</text>
  <text class="small" x="825" y="528">只返回推荐命令</text>
  <rect class="box box-purple" x="800" y="558" width="230" height="54"/>
  <text class="label" x="825" y="581">pm-dry-run</text>
  <text class="small" x="825" y="601">预览执行计划与门禁</text>
  <rect class="box box-red" x="800" y="631" width="230" height="54"/>
  <text class="label" x="825" y="654">pm-execute</text>
  <text class="small" x="825" y="674">需要确认和权限</text>
  <polygon class="decision" points="1160,658 1240,612 1320,658 1240,704"/>
  <text class="label" x="1198" y="655">门禁</text>
  <text class="small" x="1198" y="674">通过？</text>
  <path class="edge" d="M355 576 H490"/>
  <path class="edge" d="M700 576 C745 512 765 512 800 512"/>
  <path class="edge" d="M700 576 H800"/>
  <path class="edge" d="M700 576 C745 658 765 658 800 658"/>
  <path class="edge" d="M1030 658 H1160"/>
  <path class="edge-soft" d="M1240 704 V720 C1240 740 1220 742 1190 742 H1080"/>
  <text class="tiny" x="1115" y="735">未通过：返回阻塞原因</text>

  <rect class="lane" x="40" y="760" width="1320" height="240"/>
  <text class="lane-title" x="70" y="796">4. Agent 分工与完成闭环</text>
  <rect class="box box-blue" x="75" y="830" width="205" height="54"/>
  <text class="label" x="100" y="853">曹操</text>
  <text class="small" x="100" y="873">主协调 agent</text>
  <rect class="box" x="305" y="830" width="205" height="54"/>
  <text class="label" x="330" y="853">OpenCode plan</text>
  <text class="small" x="330" y="873">开发计划</text>
  <rect class="box box-green" x="535" y="830" width="205" height="54"/>
  <text class="label" x="560" y="853">OpenCode build</text>
  <text class="small" x="560" y="873">真正开发实现</text>
  <rect class="box" x="765" y="830" width="205" height="54"/>
  <text class="label" x="790" y="853">前端 subagent</text>
  <text class="small" x="790" y="873">只做 UI/交互建议</text>
  <rect class="box" x="995" y="830" width="145" height="54"/>
  <text class="label" x="1020" y="853">文档</text>
  <text class="small" x="1020" y="873">说明/发布</text>
  <rect class="box" x="1170" y="830" width="145" height="54"/>
  <text class="label" x="1195" y="853">QA</text>
  <text class="small" x="1195" y="873">审查门禁</text>

  <rect class="box box-yellow" x="475" y="925" width="290" height="54"/>
  <text class="label" x="500" y="948">审查标记与门禁</text>
  <text class="small" x="500" y="968">同步状态、重试、回退、发布就绪</text>
  <polygon class="decision" points="935,952 1005,912 1075,952 1005,992"/>
  <text class="label" x="976" y="949">完成？</text>

  <path class="edge" d="M1240 612 C1240 785 920 790 860 830"/>
  <path class="edge-soft" d="M595 632 C555 750 170 745 177 830"/>
  <path class="edge-soft" d="M595 632 C560 745 405 750 407 830"/>
  <path class="edge-soft" d="M595 632 C610 745 637 750 637 830"/>
  <path class="edge-soft" d="M595 632 C710 745 865 750 867 830"/>
  <path class="edge-soft" d="M595 632 C785 745 1068 750 1068 830"/>
  <path class="edge-soft" d="M595 632 C825 745 1242 750 1242 830"/>

  <path class="edge-soft" d="M177 884 C177 920 430 935 475 952"/>
  <path class="edge-soft" d="M407 884 C407 915 450 935 475 952"/>
  <path class="edge-soft" d="M637 884 V925"/>
  <path class="edge-soft" d="M867 884 C867 920 810 935 765 952"/>
  <path class="edge-soft" d="M1068 884 C1068 920 820 940 765 952"/>
  <path class="edge-soft" d="M1242 884 C1242 930 840 945 765 952"/>
  <path class="edge" d="M765 952 H935"/>
  <path class="edge-soft" d="M1005 912 C1005 770 300 760 217 607"/>
  <text class="tiny" x="890" y="910">否：重新调度</text>
  <text class="tiny" x="1085" y="958">是：发布就绪</text>
</svg>
